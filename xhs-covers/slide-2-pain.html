<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>OneStyle 小红书 · 图 2 痛点</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:#e5e5e5;padding:40px;display:flex;justify-content:center}
.slide{
  width:1080px;height:1440px;
  background:radial-gradient(120% 80% at 50% 30%, #1a2050 0%, #0a0e26 50%, #050715 100%);
  position:relative;overflow:hidden;color:#fff;padding:80px;
}
.tag{
  display:inline-flex;align-items:center;gap:12px;
  padding:14px 28px;background:rgba(253,94,50,0.15);border:1px solid rgba(253,94,50,0.3);
  border-radius:999px;font-size:28px;color:#FFEED8;font-weight:500;
}
.title{
  font-size:96px;font-weight:900;color:#fff;
  line-height:1.08;letter-spacing:-0.03em;
  margin:32px 0 64px;
}
.title-em{
  background:linear-gradient(135deg,#FFEED8 0%,#FD5E32 100%);
  -webkit-background-clip:text;background-clip:text;
  -webkit-text-fill-color:transparent;
}
.pain-list{display:flex;flex-direction:column;gap:24px}
.pain-card{
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:24px;padding:40px 44px;
  display:flex;gap:36px;align-items:flex-start;
}
.pain-num{
  font-size:88px;font-weight:900;color:#FD5E32;
  line-height:1;font-family:Inter,sans-serif;letter-spacing:-0.04em;
  flex-shrink:0;
}
.pain-content h3{
  font-size:44px;font-weight:700;color:#fff;margin-bottom:14px;line-height:1.2;
}
.pain-content p{
  font-size:28px;color:rgba(255,255,255,0.6);line-height:1.55;
}
.watermark{
  position:absolute;bottom:30px;right:40px;
  font-size:22px;color:rgba(255,255,255,0.4);
}
.stars{position:absolute;inset:0;pointer-events:none;opacity:0.5}
.stars span{position:absolute;width:3px;height:3px;background:#fff;border-radius:50%;box-shadow:0 0 6px #fff}
</style>
</head>
<body>
<div class="slide">
  <div class="stars">
    <span style="top:6%;left:15%"></span>
    <span style="top:10%;left:70%;width:4px;height:4px"></span>
    <span style="top:18%;left:88%"></span>
    <span style="top:30%;left:8%"></span>
    <span style="top:45%;left:95%;width:2px;height:2px"></span>
  </div>

  <div class="tag">😩 以前是这样的</div>
  <h1 class="title">传统设计交付<br>的 <span class="title-em">3 大痛点</span></h1>

  <div class="pain-list">
    <div class="pain-card">
      <div class="pain-num">01</div>
      <div class="pain-content">
        <h3>Figma 标注密密麻麻</h3>
        <p>一个页面要标 30+ 处<br>设计师做完图心力交瘁</p>
      </div>
    </div>

    <div class="pain-card">
      <div class="pain-num">02</div>
      <div class="pain-content">
        <h3>前端对着标注抠像素</h3>
        <p>一行一行还原样式<br>颜色是 #FFFFFF 还是 #FAFAFA？</p>
      </div>
    </div>

    <div class="pain-card">
      <div class="pain-num">03</div>
      <div class="pain-content">
        <h3>改稿要反复拉群对齐</h3>
        <p>一个改动 30 分钟会议<br>3 个版本下来还在调间距</p>
      </div>
    </div>
  </div>

  <div class="watermark">小红书号 · AriseJF</div>
</div>
</body>
</html>
