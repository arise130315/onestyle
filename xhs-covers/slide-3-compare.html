<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>OneStyle 小红书 · 图 3 流程对比</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:#e5e5e5;padding:40px;display:flex;justify-content:center}
.slide{
  width:1080px;height:1440px;
  background:radial-gradient(120% 80% at 50% 30%, #1a2050 0%, #0a0e26 50%, #050715 100%);
  position:relative;overflow:hidden;color:#fff;padding:80px;
}
.tag{
  display:inline-flex;align-items:center;gap:12px;
  padding:14px 28px;background:rgba(79,110,247,0.18);border:1px solid rgba(79,110,247,0.35);
  border-radius:999px;font-size:28px;color:#fff;font-weight:500;
}
.title{
  font-size:96px;font-weight:900;color:#fff;
  line-height:1.08;letter-spacing:-0.03em;
  margin:32px 0 64px;
}
.title-em{
  background:linear-gradient(135deg,#9BD8FF 0%,#4F6EF7 100%);
  -webkit-background-clip:text;background-clip:text;
  -webkit-text-fill-color:transparent;
}
.compare-block{margin-bottom:40px}
.compare-label{
  font-size:30px;font-weight:600;
  margin-bottom:24px;display:flex;align-items:center;gap:14px;
}
.compare-label.bad{color:rgba(255,160,160,0.95)}
.compare-label.good{color:rgba(160,255,180,0.95)}
.compare-flow{
  display:flex;align-items:center;gap:14px;flex-wrap:wrap;
  padding:28px;border-radius:20px;
}
.compare-flow.bad{background:rgba(255,80,80,0.06);border:1px solid rgba(255,80,80,0.2)}
.compare-flow.good{background:linear-gradient(135deg,rgba(79,110,247,0.12),rgba(155,89,255,0.12));border:1px solid rgba(155,89,255,0.35)}
.step{
  padding:18px 26px;border-radius:14px;
  font-size:28px;font-weight:600;
  white-space:nowrap;
}
.step.bad-step{background:rgba(255,90,90,0.12);color:rgba(255,180,180,0.95);border:1px solid rgba(255,90,90,0.2)}
.step.good-step{background:rgba(255,255,255,0.1);color:#fff;border:1px solid rgba(255,255,255,0.15)}
.arrow{
  color:rgba(255,255,255,0.4);font-size:32px;font-weight:300;
}
.divider{
  text-align:center;margin:32px 0;
  font-size:80px;line-height:1;
  filter:drop-shadow(0 8px 24px rgba(253,94,50,0.6));
}
.bottom-note{
  position:absolute;bottom:120px;left:80px;right:80px;
  text-align:center;font-size:32px;color:rgba(255,255,255,0.7);font-weight:500;
}
.bottom-note strong{color:#FFEED8;font-weight:700}
.watermark{
  position:absolute;bottom:30px;right:40px;
  font-size:22px;color:rgba(255,255,255,0.4);
}
</style>
</head>
<body>
<div class="slide">
  <div class="tag">⚡️ 对比一下</div>
  <h1 class="title">5 步 vs 3 步<br><span class="title-em">效率原地起飞</span></h1>

  <div class="compare-block">
    <div class="compare-label bad">❌ 传统流程</div>
    <div class="compare-flow bad">
      <span class="step bad-step">截图</span>
      <span class="arrow">→</span>
      <span class="step bad-step">Figma 标注</span>
      <span class="arrow">→</span>
      <span class="step bad-step">写文档</span>
      <span class="arrow">→</span>
      <span class="step bad-step">拉群对齐</span>
      <span class="arrow">→</span>
      <span class="step bad-step">前端返工</span>
    </div>
  </div>

  <div class="divider">⚡️</div>

  <div class="compare-block">
    <div class="compare-label good">✅ OneStyle 流程</div>
    <div class="compare-flow good">
      <span class="step good-step">选中元素</span>
      <span class="arrow">→</span>
      <span class="step good-step">直接改样式</span>
      <span class="arrow">→</span>
      <span class="step good-step">一键导出 Prompt</span>
    </div>
  </div>

  <div class="bottom-note">3 步搞定，<strong>剩下交给 AI</strong> 🚀</div>
  <div class="watermark">小红书号 · AriseJF</div>
</div>
</body>
</html>
