<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>OneStyle 小红书封面 · 版式 1</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:#e5e5e5;padding:40px;display:flex;justify-content:center}
.cover{
  width:1080px;height:1440px;
  background:radial-gradient(120% 80% at 50% 30%, #1a2050 0%, #0a0e26 50%, #050715 100%);
  position:relative;overflow:hidden;
}
/* 顶部小标签 */
.tag{
  position:absolute;top:80px;left:80px;
  display:inline-flex;align-items:center;gap:14px;
  padding:14px 28px;
  background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);
  border-radius:999px;
  font-size:28px;color:#fff;font-weight:500;
  backdrop-filter:blur(8px);
}
.tag::before{
  content:"";display:inline-block;width:10px;height:10px;border-radius:50%;
  background:#FD5E32;box-shadow:0 0 12px rgba(253,94,50,0.8);
}
/* 截图区 */
.screenshot-area{
  position:absolute;top:200px;left:80px;right:80px;height:660px;
  display:flex;align-items:center;justify-content:center;
}
.screenshot{
  width:680px;border-radius:16px;overflow:hidden;
  box-shadow:0 30px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.08);
  transform:perspective(1200px) rotateX(8deg) rotateY(-4deg);
}
.screenshot img{width:100%;display:block}
/* 手绘箭头 */
.arrow-svg{
  position:absolute;top:140px;right:60px;
  width:200px;height:200px;
  filter:drop-shadow(0 4px 8px rgba(0,0,0,0.4));
}
/* 大 emoji */
.emoji{
  position:absolute;top:280px;right:50px;
  font-size:200px;
  transform:rotate(8deg);
  filter:drop-shadow(0 10px 30px rgba(0,0,0,0.6));
}
/* 标题区 */
.title-area{
  position:absolute;bottom:140px;left:80px;right:80px;
}
.title-line{
  font-size:120px;font-weight:900;color:#fff;
  line-height:1.05;letter-spacing:-0.04em;
  margin-bottom:12px;
  text-shadow:0 4px 24px rgba(0,0,0,0.4);
}
.highlight-block{
  display:inline-block;
  background:linear-gradient(135deg,#FD5E32 0%,#E8400D 100%);
  color:#fff;
  padding:4px 24px;border-radius:12px;
  box-shadow:0 8px 24px rgba(253,94,50,0.4);
}
.highlight-text{
  background:linear-gradient(135deg,#FFEED8 0%,#FD5E32 100%);
  -webkit-background-clip:text;background-clip:text;
  -webkit-text-fill-color:transparent;
}
/* 底部副标题 */
.subtitle{
  position:absolute;bottom:80px;left:80px;
  font-size:32px;color:rgba(255,255,255,0.7);font-weight:400;
}
/* 水印 */
.watermark{
  position:absolute;bottom:40px;right:50px;
  font-size:22px;color:rgba(255,255,255,0.4);font-weight:500;
}
/* 背景装饰星点 */
.stars{position:absolute;inset:0;pointer-events:none;opacity:0.6}
.stars span{position:absolute;width:3px;height:3px;background:#fff;border-radius:50%;box-shadow:0 0 6px #fff}
</style>
</head>
<body>
<div class="cover">
  <!-- 背景装饰 -->
  <div class="stars">
    <span style="top:8%;left:15%"></span>
    <span style="top:12%;left:60%"></span>
    <span style="top:18%;left:85%;width:4px;height:4px"></span>
    <span style="top:30%;left:8%;width:2px;height:2px"></span>
    <span style="top:42%;left:92%"></span>
    <span style="top:55%;left:5%;width:4px;height:4px"></span>
    <span style="top:25%;left:45%;width:2px;height:2px"></span>
  </div>

  <!-- 顶部标签 -->
  <div class="tag">OneStyle · vibe coding 神器</div>

  <!-- 工具截图 -->
  <div class="screenshot-area">
    <div class="screenshot">
      <img src="../img/img_01.png" alt="OneStyle 工具截图">
    </div>
  </div>

  <!-- 手绘箭头 -->
  <svg class="arrow-svg" viewBox="0 0 200 200">
    <path d="M 30 30 Q 100 10 150 80 Q 180 130 130 160"
          stroke="#FFEED8" stroke-width="6" fill="none"
          stroke-linecap="round" stroke-dasharray="0"/>
    <path d="M 115 145 L 135 162 L 115 175"
          stroke="#FFEED8" stroke-width="6" fill="none"
          stroke-linecap="round" stroke-linejoin="round"/>
  </svg>

  <!-- 大 emoji -->
  <div class="emoji">🤩</div>

  <!-- 标题 -->
  <div class="title-area">
    <div class="title-line">网页上 P 设计稿</div>
    <div class="title-line">一键给 <span class="highlight-text">AI</span> 写代码</div>
  </div>

  <!-- 副标题 -->
  <div class="subtitle">vibe coding 必备的 Chrome 插件 ✨</div>

  <!-- 水印 -->
  <div class="watermark">小红书号 · AriseJF</div>
</div>
</body>
</html>
