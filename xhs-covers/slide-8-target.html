<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>OneStyle 小红书 · 图 8 适合人群</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:#e5e5e5;padding:40px;display:flex;justify-content:center}
.slide{
  width:1080px;height:1440px;
  background:radial-gradient(120% 80% at 50% 30%, #1a2050 0%, #0a0e26 50%, #050715 100%);
  position:relative;overflow:hidden;color:#fff;padding:80px;
}
.tag{
  display:inline-flex;align-items:center;gap:12px;
  padding:14px 28px;background:rgba(155,89,255,0.18);border:1px solid rgba(155,89,255,0.35);
  border-radius:999px;font-size:28px;color:#fff;font-weight:500;
}
.title{
  font-size:96px;font-weight:900;color:#fff;
  line-height:1.08;letter-spacing:-0.03em;
  margin:32px 0 56px;
}
.title-em{
  background:linear-gradient(135deg,#FFEED8 0%,#FD5E32 100%);
  -webkit-background-clip:text;background-clip:text;
  -webkit-text-fill-color:transparent;
}
.target-list{display:flex;flex-direction:column;gap:20px}
.target-card{
  display:flex;align-items:center;gap:28px;
  padding:32px 36px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:24px;
}
.target-icon{
  width:88px;height:88px;border-radius:20px;
  display:flex;align-items:center;justify-content:center;
  font-size:48px;line-height:1;flex-shrink:0;
}
.icon-1{background:linear-gradient(135deg,rgba(79,110,247,0.3),rgba(79,110,247,0.1));border:1px solid rgba(79,110,247,0.4)}
.icon-2{background:linear-gradient(135deg,rgba(253,94,50,0.3),rgba(253,94,50,0.1));border:1px solid rgba(253,94,50,0.4)}
.icon-3{background:linear-gradient(135deg,rgba(80,200,120,0.3),rgba(80,200,120,0.1));border:1px solid rgba(80,200,120,0.4)}
.icon-4{background:linear-gradient(135deg,rgba(155,89,255,0.3),rgba(155,89,255,0.1));border:1px solid rgba(155,89,255,0.4)}
.target-text h3{
  font-size:42px;font-weight:700;color:#fff;margin-bottom:8px;line-height:1.2;
}
.target-text p{
  font-size:26px;color:rgba(255,255,255,0.65);line-height:1.5;
}
.watermark{
  position:absolute;bottom:30px;right:40px;
  font-size:22px;color:rgba(255,255,255,0.4);
}
</style>
</head>
<body>
<div class="slide">
  <div class="tag">✨ 适合人群</div>
  <h1 class="title">这些人用起来<br><span class="title-em">最香 🤤</span></h1>

  <div class="target-list">
    <div class="target-card">
      <div class="target-icon icon-1">🤖</div>
      <div class="target-text">
        <h3>vibe coding 党</h3>
        <p>给 AI 写更精准的 prompt，减少返工</p>
      </div>
    </div>

    <div class="target-card">
      <div class="target-icon icon-2">🎨</div>
      <div class="target-text">
        <h3>UI / 视觉设计师</h3>
        <p>走查、改稿、批注，不再发 Figma 截图</p>
      </div>
    </div>

    <div class="target-card">
      <div class="target-icon icon-3">💻</div>
      <div class="target-text">
        <h3>前端工程师</h3>
        <p>收到的是结构化 Prompt 不是标注图</p>
      </div>
    </div>

    <div class="target-card">
      <div class="target-icon icon-4">🚀</div>
      <div class="target-text">
        <h3>独立开发者</h3>
        <p>从想法到上线，全程自己搞定</p>
      </div>
    </div>
  </div>

  <div class="watermark">小红书号 · AriseJF</div>
</div>
</body>
</html>
